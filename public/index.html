       3.24.0 (celle du package.json) y est garantie. Expose window.mapboxgl,
       utilisé par OceanMap.jsx et PacificMap.jsx. Identique en dev et en prod. -->
  <link href="https://unpkg.com/mapbox-gl@3.24.0/dist/mapbox-gl.css" rel="stylesheet" />
